# для проксирования websocket (Grafana Live)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # встроенный DNS Docker: без него nginx кэширует IP api при старте и после
    # пересоздания контейнера отдаёт 502, держась за старый адрес
    resolver 127.0.0.11 valid=10s;

    # Grafana под тем же хостом: /grafana виден из интерфейса планера, отдельный порт не нужен
    location = /grafana { return 301 /grafana/; }
    location /grafana/ {
        set $grafana grafana:3000;
        proxy_pass http://$grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        set $backend api:8000;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
