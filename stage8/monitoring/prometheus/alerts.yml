groups:
  - name: forecast-degradation
    rules:
      - alert: ModelDegraded
        expr: forecast_degraded{job="forecast-api"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Модель деградировала по гейту качества"
          description: "Сработал гейт деградации (точность, смещение, интервалы или дрейф). Повод для разбора и переобучения."

      - alert: IntervalCoverageLow
        expr: forecast_interval_coverage{job="forecast-api"} < 0.6
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Интервалы прогноза слишком узкие"
          description: "Доля факта в интервале P10-P90 ниже 0.6 при номинальных 0.8 - интервалы недооценивают неопределённость."

      - alert: FeatureDrift
        expr: max(forecast_data_drift_psi{job="forecast-api"}) > 0.25
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Заметный дрейф входных признаков"
          description: "PSI признака выше 0.25 - распределение входа заметно ушло от эталона год назад."

      - alert: ModelBeatenByBaseline
        expr: forecast_fva_ma4_pct{job="forecast-api"} <= -8
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Модель перестала бить базу MA-4"
          description: "Проигрыш скользящему среднему MA-4 глубже -8% - относительная деградация за пределами шума одного магазина."

      - alert: PlanningBiasHigh
        expr: forecast_planning_bias{job="forecast-api"} > 0.15
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Смещение на плановом уровне велико"
          description: "Модуль смещения на уровне штата выше 0.15 - систематический сдвиг заказа на плановом уровне."

      - alert: WorkerChunkFailures
        expr: sum(rate(forecast_chunks_processed_total{job="forecast-worker",result="failed"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Воркеры проваливают пачки"
          description: "Есть провалы обработки пачек за последние 10 минут."

      - alert: DataIncomplete
        expr: forecast_latest_week_completeness{job="forecast-api"} < 0.9
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Свежие данные загрузились не полностью"
          description: "Доля недавно активных рядов с фактом за последнюю неделю ниже 0.9 - загрузка неполная или запоздала."

      - alert: ForecastUnstable
        expr: forecast_revision_volatility{job="forecast-api"} > 0.3
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Прогноз нестабилен между прогонами"
          description: "Разброс P50 на одну неделю ряда между origin выше 0.3 - прогноз сильно дёргается от прогона к прогону."

      - alert: ModelFallback
        expr: sum(rate(forecast_fallback_series_total{job="forecast-worker"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Модель выдаёт мусор, включился фоллбек"
          description: "Есть ряды с подменой прогноза на базу MA-4 (NaN или скачок модели) за последние 10 минут."

      - alert: RunIncomplete
        expr: forecast_run_coverage{job="forecast-api"} < 0.99
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Прогон неполный"
          description: "Спрогнозировано меньше 0.99 запрошенных рядов - часть рядов выпала (провал пачки или пустая история)."

      - alert: ArtifactStale
        expr: forecast_artifact_age_days{job="forecast-api"} > 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Артефакт модели устарел"
          description: "Возраст артефакта модели больше 14 дней - пора переобучать."

  - name: infra
    rules:
      - alert: QueueBacklogStuck
        expr: rabbitmq_queue_messages_ready > 500
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Очередь копится и не разбирается"
          description: "В очереди больше 500 сообщений дольше 15 минут - воркеры не справляются или встали."

      - alert: NoQueueConsumers
        expr: rabbitmq_consumers == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Нет потребителей очереди"
          description: "Потребителей очереди ноль дольше 5 минут - все воркеры умерли, прогоны не считаются."

      - alert: PostgresConnectionsHigh
        expr: sum(pg_stat_database_numbackends) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Соединений с Postgres много"
          description: "Больше 80 соединений с Postgres дольше 10 минут - близко к пределу пула."

      - alert: ContainerMemoryHigh
        expr: max(container_memory_usage_bytes{id=~"/docker/.+"}) > 3.6e9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Контейнер у предела памяти"
          description: "Память контейнера выше 3.6 ГБ - у воркера лимит 4 ГБ, близко к OOM, пачки начнут падать."

      - alert: DiskAlmostFull
        expr: max(container_fs_usage_bytes / container_fs_limit_bytes) > 0.9
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Диск почти заполнен"
          description: "Занятость файловой системы контейнера выше 0.9 - скоро встанет всё."
