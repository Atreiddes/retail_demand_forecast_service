# Переменные окружения приложения. Значения по умолчанию рассчитаны на сеть compose
# (хосты db и rabbitmq), поэтому стек поднимается без .env. Файл .env, если он есть,
# подхватывается compose автоматически и переопределяет эти значения.
x-app-env: &app-env
  DB_URL: ${DB_URL:-postgresql+psycopg://postgres:postgres@db:5432/forecast}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://app:app@rabbitmq:5672/}
  CHUNK_SIZE: ${CHUNK_SIZE:-300}
  API_KEY: ${API_KEY:-demo-key}

# Артефакт модели и метрики примонтированы с хоста: переобучение (Airflow) кладёт новые
# файлы в эти каталоги, воркеры подхватывают модель по mtime без пересборки образа.
x-app-volumes: &app-volumes
  - ./artifacts:/app/artifacts:ro
  - ./metrics:/app/metrics:ro

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-forecast}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-app}
    ports:
      - "${RMQ_MGMT_PORT:-15672}:15672"  # панель управления для показа
    volumes:
      # включаем плагин rabbitmq_prometheus: метрики брокера на порту 15692 для Prometheus
      - ./monitoring/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      # проверяем доступность портов-листенеров (в т.ч. AMQP 5672), а не только ping:
      # иначе воркер стартует раньше, чем поднят AMQP, и падает на подключении
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Разовое наполнение БД при пустой базе, до старта api и воркеров
  init:
    image: stage8-api
    build: .
    command: ["python", "-m", "forecast_service.seed"]
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    image: stage8-api
    build: .
    environment: *app-env
    volumes: *app-volumes
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    image: stage8-api
    build: .
    command: ["python", "-m", "forecast_service.worker"]
    environment: *app-env
    volumes: *app-volumes
    # лимиты: крупный прогон по всем магазинам не должен забирать всю машину
    cpus: 3
    mem_limit: 4g
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # Мониторинг: Prometheus собирает метрики api, воркеров, брокера и БД, Grafana их рисует
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    ports:
      - "${PROM_PORT:-9090}:9090"
    depends_on:
      - api
    restart: unless-stopped

  # Alertmanager: принимает алерты от Prometheus и доставляет их (вебхук в api)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      # анонимный вход с правами просмотра: для показа дашборды открываются без логина
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # Grafana отдаётся под /grafana за nginx (тот же хост и порт, что и интерфейс планера)
      GF_SERVER_ROOT_URL: "http://localhost:${WEB_PORT:-80}/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # Экспортёр метрик Postgres для Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-forecast}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Метрики контейнеров (CPU, память, OOM, файловая система) для Prometheus
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    restart: unless-stopped

  # Оркестратор переобучения, ops-профиль: docker compose --profile ops up -d airflow
  # Грузит dags/, петля monitor_and_retrain опрашивает гейт и запускает retrain_artifact.
  # Не входит в стандартный up, деплоится отдельно в окружении оркестратора.
  airflow:
    image: apache/airflow:2.10.4-python3.12
    profiles: ["ops"]
    command: standalone
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      SERVICE_URL: "http://api:8000"
      DB_URL: "postgresql+psycopg://postgres:postgres@db:5432/forecast"
      # лёгкие зависимости для валидации входа; sqlmodel не ставим - он тянет SQLAlchemy 2,
      # несовместимую с Airflow. Тяжёлое переобучение выполняется в обучающем образе (ops)
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas numpy<2 pyarrow pandera pydantic-settings"
    volumes:
      - .:/opt/airflow/project
      - ../stage5:/opt/airflow/stage5
    ports:
      - "${AIRFLOW_PORT:-8793}:8080"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafanadata:
