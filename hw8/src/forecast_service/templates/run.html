{% extends "base.html" %}
{% block content %}
<h1>Прогон {{ run_id }}</h1>

<div class="card">
  <div class="status-line">
    Статус: <span id="status">—</span>
    <span id="meta" class="muted"></span>
  </div>
  <div class="progress">
    <div id="progress-bar" class="progress-inner" style="width:0%"></div>
  </div>
  <div class="actions">
    <a class="btn" href="/api/runs/{{ run_id }}/export.csv">Выгрузить CSV</a>
  </div>
</div>

<section id="result" hidden>
  <h2>Ряды</h2>
  <table class="grid" id="catalog">
    <thead>
      <tr>
        <th data-key="series_id" data-type="str">Ряд</th>
        <th data-key="item_id" data-type="str">Товар</th>
        <th data-key="sum_p50" data-type="num">Сумма P50</th>
        <th data-key="interval_width" data-type="num">Ширина P10-P90</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>График ряда</h2>
  <div id="chart" class="chart"></div>

  <h2>Метрики</h2>
  <div id="model-version" class="muted"></div>
  <div id="wrmsse"></div>
  <table class="grid" id="metrics">
    <thead>
      <tr><th>Уровень</th><th>Значение</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<script>
const RUN_ID = {{ run_id | tojson }};
let pollTimer = null;
let catalogRows = [];
let sortState = { key: null, dir: 1 };

function pct(done, total) {
  if (!total) return 0;
  return Math.round((done / total) * 100);
}

async function poll() {
  try {
    const resp = await fetch("/api/runs/" + RUN_ID);
    if (!resp.ok) return;
    const r = await resp.json();
    document.getElementById("status").textContent = r.status;
    document.getElementById("meta").textContent =
      "рядов: " + (r.n_series ?? "—") + ", чанков: " + (r.n_chunks_done ?? 0) + "/" + (r.n_chunks ?? 0);
    const p = pct(r.n_chunks_done, r.n_chunks);
    document.getElementById("progress-bar").style.width = p + "%";

    if (r.status === "completed" || r.status === "partial") {
      clearInterval(pollTimer);
      document.getElementById("progress-bar").style.width = "100%";
      await loadResult();
    } else if (r.status === "failed") {
      clearInterval(pollTimer);
    }
  } catch (ex) {
    // временная ошибка сети, следующий опрос повторит
  }
}

async function loadResult() {
  document.getElementById("result").hidden = false;
  await Promise.all([loadCatalog(), loadMetrics()]);
}

function widthClass(width, median) {
  if (median <= 0) return "";
  if (width <= median * 0.7) return "narrow";
  if (width <= median * 1.3) return "mid";
  return "wide";
}

function median(values) {
  if (!values.length) return 0;
  const s = values.slice().sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
}

async function loadCatalog() {
  const resp = await fetch("/api/runs/" + RUN_ID + "/catalog");
  catalogRows = await resp.json();
  renderCatalog();
}

function renderCatalog() {
  const med = median(catalogRows.map(r => r.interval_width));
  const tbody = document.querySelector("#catalog tbody");
  tbody.innerHTML = "";
  for (const row of catalogRows) {
    const tr = document.createElement("tr");
    tr.className = "series-row";
    tr.addEventListener("click", () => loadForecast(row.series_id));

    const cells = [
      { v: row.series_id, cls: "" },
      { v: row.item_id, cls: "" },
      { v: fmt(row.sum_p50), cls: "" },
      { v: fmt(row.interval_width), cls: widthClass(row.interval_width, med) }
    ];
    for (const c of cells) {
      const td = document.createElement("td");
      td.textContent = c.v;
      if (c.cls) td.className = c.cls;
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

function fmt(x) {
  if (x === null || x === undefined) return "—";
  return (typeof x === "number") ? Math.round(x * 100) / 100 : x;
}

document.querySelectorAll("#catalog th").forEach(th => {
  th.addEventListener("click", () => {
    const key = th.dataset.key;
    const type = th.dataset.type;
    if (sortState.key === key) sortState.dir *= -1;
    else { sortState.key = key; sortState.dir = 1; }
    catalogRows.sort((a, b) => {
      let x = a[key], y = b[key];
      if (type === "num") { x = +x; y = +y; }
      if (x < y) return -1 * sortState.dir;
      if (x > y) return 1 * sortState.dir;
      return 0;
    });
    renderCatalog();
  });
});

async function loadForecast(seriesId) {
  const resp = await fetch("/api/runs/" + RUN_ID + "/forecast?series_id=" + encodeURIComponent(seriesId));
  const d = await resp.json();

  const hx = d.history.map(p => p.week);
  const hy = d.history.map(p => p.units);
  const fx = d.points.map(p => p.week);
  const p10 = d.points.map(p => p.p10);
  const p50 = d.points.map(p => p.p50);
  const p90 = d.points.map(p => p.p90);

  const traces = [
    {
      x: fx, y: p10, name: "P10", mode: "lines",
      line: { width: 0 }, showlegend: false, hoverinfo: "skip"
    },
    {
      x: fx, y: p90, name: "P10-P90", mode: "lines",
      line: { width: 0 }, fill: "tonexty", fillcolor: "rgba(31,119,180,0.2)"
    },
    {
      x: fx, y: p50, name: "P50", mode: "lines",
      line: { color: "#1f77b4" }
    },
    {
      x: hx, y: hy, name: "История", mode: "lines",
      line: { color: "#555" }
    }
  ];
  const layout = {
    title: d.series_id,
    margin: { t: 40, r: 20, b: 40, l: 50 },
    xaxis: { title: "Неделя" },
    yaxis: { title: "Единицы" }
  };
  Plotly.newPlot("chart", traces, layout, { responsive: true });
}

async function loadMetrics() {
  const resp = await fetch("/api/runs/" + RUN_ID + "/metrics");
  const m = await resp.json();
  document.getElementById("model-version").textContent = "Модель: " + (m.model_version ?? "—");
  document.getElementById("wrmsse").textContent = "WRMSSE: " + fmt(m.wrmsse);
  const tbody = document.querySelector("#metrics tbody");
  tbody.innerHTML = "";
  for (const row of (m.rows || [])) {
    const tr = document.createElement("tr");
    const a = document.createElement("td");
    a.textContent = row.level;
    const b = document.createElement("td");
    b.textContent = fmt(row.value);
    tr.appendChild(a);
    tr.appendChild(b);
    tbody.appendChild(tr);
  }
}

poll();
pollTimer = setInterval(poll, 1500);
</script>
{% endblock %}
