global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: forecast-api
    static_configs:
      - targets: ["api:8000"]

  # Воркеров может быть несколько (docker compose up --scale worker=N): DNS сервиса
  # отдаёт адреса всех реплик, каждая слушает 9100
  - job_name: forecast-worker
    dns_sd_configs:
      - names: ["worker"]
        type: A
        port: 9100

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
