# Переменные окружения приложения. Значения по умолчанию рассчитаны на сеть compose
# (хосты db и rabbitmq), поэтому стек поднимается без .env. Файл .env, если он есть,
# подхватывается compose автоматически и переопределяет эти значения.
x-app-env: &app-env
  DB_URL: ${DB_URL:-postgresql+psycopg://postgres:postgres@db:5432/forecast}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://app:app@rabbitmq:5672/}
  CHUNK_SIZE: ${CHUNK_SIZE:-300}
  API_KEY: ${API_KEY:-demo-key}

# Артефакт модели и метрики примонтированы с хоста: переобучение (Airflow) кладёт новые
# файлы в эти каталоги, воркеры подхватывают модель по mtime без пересборки образа.
x-app-volumes: &app-volumes
  - ./artifacts:/app/artifacts:ro
  - ./metrics:/app/metrics:ro

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-forecast}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-app}
    ports:
      - "${RMQ_MGMT_PORT:-15672}:15672"  # панель управления для показа
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Разовое наполнение БД при пустой базе, до старта api и воркеров
  init:
    image: hw8-api
    build: .
    command: ["python", "-m", "forecast_service.seed"]
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    image: hw8-api
    build: .
    environment: *app-env
    volumes: *app-volumes
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    image: hw8-api
    build: .
    command: ["python", "-m", "forecast_service.worker"]
    environment: *app-env
    volumes: *app-volumes
    # лимиты: крупный прогон по всем магазинам не должен забирать всю машину
    cpus: 3
    mem_limit: 4g
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
